<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="color-scheme" content="light only">
    <meta name="darkreader-lock">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Verification — Adoptly</title>
    <link rel="stylesheet" href="auth-styles.css">
</head>
<body>
    <!-- Background -->
    <div class="auth-bg"></div>

    <!-- Floating paw prints -->
    <div class="floating-paws">
        <svg class="paw" viewBox="0 0 24 24" fill="currentColor"><circle cx="7" cy="5" r="2"/><circle cx="17" cy="5" r="2"/><circle cx="4" cy="11" r="1.8"/><circle cx="20" cy="11" r="1.8"/><ellipse cx="12" cy="16.5" rx="5" ry="3.5"/></svg>
        <svg class="paw" viewBox="0 0 24 24" fill="currentColor"><circle cx="7" cy="5" r="2"/><circle cx="17" cy="5" r="2"/><circle cx="4" cy="11" r="1.8"/><circle cx="20" cy="11" r="1.8"/><ellipse cx="12" cy="16.5" rx="5" ry="3.5"/></svg>
        <svg class="paw" viewBox="0 0 24 24" fill="currentColor"><circle cx="7" cy="5" r="2"/><circle cx="17" cy="5" r="2"/><circle cx="4" cy="11" r="1.8"/><circle cx="20" cy="11" r="1.8"/><ellipse cx="12" cy="16.5" rx="5" ry="3.5"/></svg>
        <svg class="paw" viewBox="0 0 24 24" fill="currentColor"><circle cx="7" cy="5" r="2"/><circle cx="17" cy="5" r="2"/><circle cx="4" cy="11" r="1.8"/><circle cx="20" cy="11" r="1.8"/><ellipse cx="12" cy="16.5" rx="5" ry="3.5"/></svg>
        <svg class="paw" viewBox="0 0 24 24" fill="currentColor"><circle cx="7" cy="5" r="2"/><circle cx="17" cy="5" r="2"/><circle cx="4" cy="11" r="1.8"/><circle cx="20" cy="11" r="1.8"/><ellipse cx="12" cy="16.5" rx="5" ry="3.5"/></svg>
        <svg class="paw" viewBox="0 0 24 24" fill="currentColor"><circle cx="7" cy="5" r="2"/><circle cx="17" cy="5" r="2"/><circle cx="4" cy="11" r="1.8"/><circle cx="20" cy="11" r="1.8"/><ellipse cx="12" cy="16.5" rx="5" ry="3.5"/></svg>
        <svg class="paw" viewBox="0 0 24 24" fill="currentColor"><circle cx="7" cy="5" r="2"/><circle cx="17" cy="5" r="2"/><circle cx="4" cy="11" r="1.8"/><circle cx="20" cy="11" r="1.8"/><ellipse cx="12" cy="16.5" rx="5" ry="3.5"/></svg>
        <svg class="paw" viewBox="0 0 24 24" fill="currentColor"><circle cx="7" cy="5" r="2"/><circle cx="17" cy="5" r="2"/><circle cx="4" cy="11" r="1.8"/><circle cx="20" cy="11" r="1.8"/><ellipse cx="12" cy="16.5" rx="5" ry="3.5"/></svg>
    </div>

    <!-- Single Centered Card -->
    <div class="auth-page">
        <div class="auth-card" id="authCard">

            <!-- Brand -->
            <div class="auth-brand">
                <div class="auth-brand-icon">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <circle cx="7" cy="5" r="2.2"/>
                        <circle cx="17" cy="5" r="2.2"/>
                        <circle cx="3.5" cy="11.5" r="2"/>
                        <circle cx="20.5" cy="11.5" r="2"/>
                        <ellipse cx="12" cy="17" rx="5.5" ry="4"/>
                    </svg>
                </div>
                <h1>Adoptly</h1>
                <p>Find your perfect companion</p>
            </div>

            <!-- Success Content -->
            <div id="successContent" style="display: none; text-align: center; padding: 16px 0;">
                <div style="width: 72px; height: 72px; margin: 0 auto 16px; background: #f0fdf4; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid #bbf7d0;">
                    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                        <polyline points="22 4 12 14.01 9 11.01"/>
                    </svg>
                </div>
                <h2 style="color: #166534; font-size: 1.4rem; margin-bottom: 8px;">Email Verified!</h2>
                <p style="color: #5f7268; font-size: 0.9rem; line-height: 1.6; margin-bottom: 24px;">
                    Your email has been successfully verified.<br>You can now log in to your account.
                </p>
                <a href="/login" class="btn btn-primary" style="text-decoration: none; display: inline-flex; padding: 12px 32px;">
                    <span>Go to Login</span>
                    <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                </a>
            </div>

            <!-- Failed Content -->
            <div id="failedContent" style="display: none; text-align: center; padding: 16px 0;">
                <div style="width: 72px; height: 72px; margin: 0 auto 16px; background: #fef2f2; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid #fecaca;">
                    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="15" y1="9" x2="9" y2="15"/>
                        <line x1="9" y1="9" x2="15" y2="15"/>
                    </svg>
                </div>
                <h2 style="color: #991b1b; font-size: 1.4rem; margin-bottom: 8px;">Verification Failed</h2>
                <p style="color: #5f7268; font-size: 0.9rem; line-height: 1.6; margin-bottom: 16px;">
                    This verification link has expired or is invalid.<br>Please request a new verification email.
                </p>

                <!-- Resend form -->
                <div style="margin-bottom: 20px;">
                    <div class="form-group" style="text-align: left; max-width: 320px; margin: 0 auto;">
                        <label for="resendEmail" style="justify-content: center;">
                            <span class="label-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                            </span>
                            Your Email
                        </label>
                        <input type="email" id="resendEmail" placeholder="Enter your email" style="text-align: center;">
                    </div>
                </div>
                <button onclick="resendVerification()" class="btn btn-primary" style="padding: 12px 28px;">
                    <span id="resendBtnText">Resend Verification Email</span>
                    <span id="resendSpinner" class="spinner" style="display: none;"></span>
                </button>
                <div id="resendMessage" class="message" style="margin-top: 12px;"></div>
            </div>

            <!-- Footer -->
            <div class="auth-footer">
                <p>Back to <a href="/login" class="link-primary">Sign In</a></p>
            </div>
        </div>
    </div>

    <script>
        // Determine success or failure from URL path
        const isSuccess = window.location.pathname.includes('success');
        const isFailed = window.location.pathname.includes('failed');

        if (isSuccess) {
            document.getElementById('successContent').style.display = 'block';
        } else {
            document.getElementById('failedContent').style.display = 'block';
        }

        async function resendVerification() {
            const email = document.getElementById('resendEmail').value.trim();
            const msg = document.getElementById('resendMessage');
            const btnText = document.getElementById('resendBtnText');
            const spinner = document.getElementById('resendSpinner');

            if (!email) {
                msg.textContent = 'Please enter your email address.';
                msg.className = 'message message-error';
                return;
            }

            btnText.style.display = 'none';
            spinner.style.display = 'inline-block';
            msg.textContent = '';
            msg.className = 'message';

            try {
                const response = await fetch('/api/resend-verification', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email: email })
                });
                const data = await response.json();
                if (data.ok) {
                    msg.textContent = data.message;
                    msg.className = 'message message-success';
                } else {
                    msg.textContent = data.message;
                    msg.className = 'message message-error';
                }
            } catch {
                msg.textContent = 'Failed to resend. Please try again.';
                msg.className = 'message message-error';
            }
            btnText.style.display = 'inline';
            spinner.style.display = 'none';
        }

        // Entrance
        window.addEventListener('DOMContentLoaded', function() {
            setTimeout(() => document.getElementById('authCard').classList.add('loaded'), 80);
        });
    </script>
</body>
</html>
