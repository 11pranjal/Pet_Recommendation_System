<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="color-scheme" content="light only">
    <meta name="darkreader-lock">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password — Adoptly</title>
    <link rel="stylesheet" href="auth-styles.css">
</head>
<body>
    <!-- Background -->
    <div class="auth-bg"></div>

    <!-- Floating paw prints -->
    <div class="floating-paws">
        <svg class="paw" viewBox="0 0 24 24" fill="currentColor"><circle cx="7" cy="5" r="2"/><circle cx="17" cy="5" r="2"/><circle cx="4" cy="11" r="1.8"/><circle cx="20" cy="11" r="1.8"/><ellipse cx="12" cy="16.5" rx="5" ry="3.5"/></svg>
        <svg class="paw" viewBox="0 0 24 24" fill="currentColor"><circle cx="7" cy="5" r="2"/><circle cx="17" cy="5" r="2"/><circle cx="4" cy="11" r="1.8"/><circle cx="20" cy="11" r="1.8"/><ellipse cx="12" cy="16.5" rx="5" ry="3.5"/></svg>
        <svg class="paw" viewBox="0 0 24 24" fill="currentColor"><circle cx="7" cy="5" r="2"/><circle cx="17" cy="5" r="2"/><circle cx="4" cy="11" r="1.8"/><circle cx="20" cy="11" r="1.8"/><ellipse cx="12" cy="16.5" rx="5" ry="3.5"/></svg>
        <svg class="paw" viewBox="0 0 24 24" fill="currentColor"><circle cx="7" cy="5" r="2"/><circle cx="17" cy="5" r="2"/><circle cx="4" cy="11" r="1.8"/><circle cx="20" cy="11" r="1.8"/><ellipse cx="12" cy="16.5" rx="5" ry="3.5"/></svg>
        <svg class="paw" viewBox="0 0 24 24" fill="currentColor"><circle cx="7" cy="5" r="2"/><circle cx="17" cy="5" r="2"/><circle cx="4" cy="11" r="1.8"/><circle cx="20" cy="11" r="1.8"/><ellipse cx="12" cy="16.5" rx="5" ry="3.5"/></svg>
        <svg class="paw" viewBox="0 0 24 24" fill="currentColor"><circle cx="7" cy="5" r="2"/><circle cx="17" cy="5" r="2"/><circle cx="4" cy="11" r="1.8"/><circle cx="20" cy="11" r="1.8"/><ellipse cx="12" cy="16.5" rx="5" ry="3.5"/></svg>
        <svg class="paw" viewBox="0 0 24 24" fill="currentColor"><circle cx="7" cy="5" r="2"/><circle cx="17" cy="5" r="2"/><circle cx="4" cy="11" r="1.8"/><circle cx="20" cy="11" r="1.8"/><ellipse cx="12" cy="16.5" rx="5" ry="3.5"/></svg>
        <svg class="paw" viewBox="0 0 24 24" fill="currentColor"><circle cx="7" cy="5" r="2"/><circle cx="17" cy="5" r="2"/><circle cx="4" cy="11" r="1.8"/><circle cx="20" cy="11" r="1.8"/><ellipse cx="12" cy="16.5" rx="5" ry="3.5"/></svg>
    </div>

    <!-- Single Centered Card -->
    <div class="auth-page">
        <div class="auth-card" id="authCard">

            <!-- Brand -->
            <div class="auth-brand">
                <div class="auth-brand-icon">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <circle cx="7" cy="5" r="2.2"/>
                        <circle cx="17" cy="5" r="2.2"/>
                        <circle cx="3.5" cy="11.5" r="2"/>
                        <circle cx="20.5" cy="11.5" r="2"/>
                        <ellipse cx="12" cy="17" rx="5.5" ry="4"/>
                    </svg>
                </div>
                <h1>Adoptly</h1>
                <p>Find your perfect companion</p>
            </div>

            <!-- Header -->
            <div class="auth-header">
                <h2>Forgot Password?</h2>
                <p>Enter your email and we'll send you a reset link</p>
            </div>

            <!-- Form -->
            <form id="forgotForm" class="auth-form">
                <div class="form-group">
                    <label for="email">
                        <span class="label-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                        </span>
                        Email Address
                    </label>
                    <input type="email" id="email" name="email" placeholder="Enter your registered email" required autocomplete="email">
                </div>

                <button type="submit" class="btn btn-primary btn-block">
                    <span id="forgotBtnText">Send Reset Link</span>
                    <svg id="forgotArrow" class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                    <span id="forgotSpinner" class="spinner" style="display: none;"></span>
                </button>

                <div id="forgotMessage" class="message"></div>
            </form>

            <!-- Footer -->
            <div class="auth-footer">
                <p>Remember your password? <a href="/login" class="link-primary">Sign In</a></p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('forgotForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.querySelector('button[type="submit"]');
            const btnText = document.getElementById('forgotBtnText');
            const btnArrow = document.getElementById('forgotArrow');
            const spinner = document.getElementById('forgotSpinner');
            const msg = document.getElementById('forgotMessage');
            const email = document.getElementById('email').value.trim();

            btn.disabled = true;
            btnText.style.display = 'none';
            btnArrow.style.display = 'none';
            spinner.style.display = 'inline-block';
            msg.textContent = '';
            msg.className = 'message';

            try {
                const response = await fetch('/api/forgot-password', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email: email })
                });
                const data = await response.json();
                if (data.ok) {
                    msg.innerHTML = '<strong>Reset link sent!</strong><br>Please check your inbox (and spam folder) for the password reset link.';
                    msg.className = 'message message-success';
                    // Keep button disabled to prevent spam
                } else {
                    msg.textContent = data.message;
                    msg.className = 'message message-error';
                    btn.disabled = false;
                    btnText.style.display = 'inline';
                    btnArrow.style.display = 'inline';
                    spinner.style.display = 'none';
                }
            } catch {
                msg.textContent = 'Something went wrong. Please try again.';
                msg.className = 'message message-error';
                btn.disabled = false;
                btnText.style.display = 'inline';
                btnArrow.style.display = 'inline';
                spinner.style.display = 'none';
            }
        });

        // Entrance
        window.addEventListener('DOMContentLoaded', function() {
            setTimeout(() => document.getElementById('authCard').classList.add('loaded'), 80);
        });

        // Focus email input
        window.addEventListener('load', function() {
            setTimeout(() => document.getElementById('email').focus(), 500);
        });
    </script>
</body>
</html>
