<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="color-scheme" content="light only">
    <meta name="darkreader-lock">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Profile — Adoptly</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .page-wrapper { padding: 2rem 0 4rem; }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.88rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            transition: color 0.2s;
        }
        .back-link:hover { color: var(--primary); }
        .back-link svg { width: 18px; height: 18px; }

        .pet-profile {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            overflow: hidden;
            box-shadow: var(--shadow-card);
        }

        /* Hero header with circular avatar */
        .profile-header {
            background: var(--bg-hero);
            color: white;
            padding: 2.5rem 2.5rem 4rem;
            position: relative;
            text-align: center;
        }

        .profile-header-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
        }

        .profile-avatar-container {
            position: relative;
            margin-bottom: 0.5rem;
            width: 160px;
            height: 160px;
            border-radius: 50%;
            overflow: hidden;
            border: 5px solid rgba(255,255,255,0.3);
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            background: var(--bg-muted);
        }

        .profile-avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: none;
            box-shadow: none;
            object-fit: cover;
            object-position: center 25%;
            background: var(--bg-muted);
            transition: transform 0.4s var(--ease);
        }

        .profile-avatar:hover {
            transform: scale(1.06);
        }

        .profile-avatar-placeholder {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 5px solid rgba(255,255,255,0.3);
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            background: linear-gradient(135deg, var(--bg-muted) 0%, var(--primary-pale) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
        }

        .profile-name h1 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 0.2rem;
        }

        .profile-breed {
            font-size: 1rem;
            opacity: 0.8;
        }

        .profile-type-badge {
            padding: 0.35rem 0.9rem;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 100px;
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            white-space: nowrap;
            backdrop-filter: blur(4px);
        }

        .profile-body { padding: 2rem 2.5rem 2.5rem; }

        .profile-description {
            font-size: 0.95rem;
            line-height: 1.7;
            color: var(--text-secondary);
            margin-bottom: 2rem;
            padding: 1.25rem;
            background: var(--bg-muted);
            border-radius: var(--radius-lg);
            border-left: 4px solid var(--primary);
        }

        .details-section {
            margin-bottom: 2rem;
        }

        .details-section h3 {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .details-section h3 svg { width: 18px; height: 18px; color: var(--primary); }

        .details-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 0.85rem;
        }

        .detail-item {
            display: flex;
            align-items: center;
            gap: 0.65rem;
            padding: 0.85rem 1rem;
            background: var(--bg-muted);
            border-radius: 10px;
            border: 1px solid var(--border);
            transition: all 0.2s;
        }
        .detail-item:hover {
            border-color: var(--primary);
            background: var(--primary-pale);
        }

        .detail-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: var(--primary-pale);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            flex-shrink: 0;
        }
        .detail-icon svg { width: 18px; height: 18px; }

        .detail-text {
            display: flex;
            flex-direction: column;
        }
        .detail-label {
            font-size: 0.72rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            font-weight: 600;
        }
        .detail-value {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text);
        }

        /* Tags */
        .tags-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }
        .tag {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.35rem 0.75rem;
            border-radius: 100px;
            font-size: 0.78rem;
            font-weight: 600;
        }
        .tag svg { width: 13px; height: 13px; }
        .tag-green { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
        .tag-amber { background: #fffbeb; color: #92400e; border: 1px solid #fde68a; }
        .tag-blue  { background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; }

        /* Action buttons */
        .profile-actions {
            display: flex;
            gap: 0.75rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
        }

        .profile-btn {
            flex: 1;
            padding: 0.8rem 1.25rem;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 700;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-family: inherit;
            transition: all 0.25s ease;
        }
        .profile-btn svg { width: 18px; height: 18px; }

        .profile-btn-adopt {
            background: var(--primary);
            color: white;
            box-shadow: 0 3px 12px rgba(61, 139, 99, 0.25);
        }
        .profile-btn-adopt:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(61, 139, 99, 0.3);
        }

        .profile-btn-fav {
            background: transparent;
            border: 1.5px solid var(--border);
            color: var(--text-secondary);
        }
        .profile-btn-fav:hover {
            border-color: #ef4444;
            color: #ef4444;
            background: #fef2f2;
        }
        .profile-btn-fav.is-fav {
            border-color: #ef4444;
            color: #ef4444;
            background: #fef2f2;
        }

        /* Adoption Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }

        .modal-overlay .adopt-modal {
            display: block !important;
            position: relative;
            background: var(--bg-card);
            border-radius: var(--radius-xl);
            padding: 2rem;
            width: 100%;
            max-width: 480px;
            transform: translateY(10px);
            transition: transform 0.3s;
            left: auto; top: auto;
            height: auto;
            backdrop-filter: none;
            z-index: auto;
        }
        .modal-overlay.active .adopt-modal { transform: translateY(0); }

        .adopt-modal h3 {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        .adopt-modal p {
            color: var(--text-secondary);
            font-size: 0.88rem;
            margin-bottom: 1.25rem;
        }

        .adopt-modal textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            font-size: 0.88rem;
            font-family: inherit;
            resize: vertical;
            min-height: 100px;
            margin-bottom: 1rem;
            transition: border-color 0.2s;
        }
        .adopt-modal textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(61, 139, 99, 0.1);
        }

        .modal-actions {
            display: flex;
            gap: 0.5rem;
        }
        .modal-actions .profile-btn { flex: 1; }

        .modal-btn-cancel {
            background: var(--bg-muted);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }
        .modal-btn-cancel:hover { background: var(--border); }

        #adoptMsgBox {
            margin-top: 0.75rem;
            padding: 0.5rem 0.75rem;
            border-radius: 8px;
            font-size: 0.82rem;
            font-weight: 500;
            text-align: center;
            display: none;
        }
        #adoptMsgBox.adopt-msg-success { display: block; background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
        #adoptMsgBox.adopt-msg-error { display: block; background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }

        /* Loading */
        .profile-loading {
            text-align: center;
            padding: 6rem 2rem;
        }
        .profile-loading .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 640px) {
            .profile-header { padding: 1.75rem 1.75rem 3.5rem; }
            .profile-avatar, .profile-avatar-placeholder { width: 110px; height: 110px; }
            .profile-body { padding: 1.5rem; }
            .details-grid { grid-template-columns: 1fr 1fr; }
            .profile-actions { flex-direction: column; }
            .profile-name h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="/dashboard" class="nav-logo">
                <div class="logo-icon"><svg viewBox="0 0 24 24" fill="currentColor"><circle cx="7" cy="5" r="2"/><circle cx="17" cy="5" r="2"/><circle cx="4" cy="11" r="1.8"/><circle cx="20" cy="11" r="1.8"/><ellipse cx="12" cy="16.5" rx="5" ry="3.5"/></svg></div>
                <span class="logo-text">Adoptly</span>
            </a>
            <button class="hamburger" onclick="toggleMenu()"><span></span><span></span><span></span></button>
            <div class="nav-menu" id="navMenu">
                <a href="dashboard.html" class="nav-link">Dashboard</a>
                <a href="quiz.html" class="nav-link">Take Quiz</a>
                <a href="search.html" class="nav-link">Search</a>
                <a href="browse.html" class="nav-link">Browse</a>
                <a href="#" onclick="logout()" class="nav-link" style="color: var(--danger);">Sign Out</a>
            </div>
        </div>
    </nav>

    <div class="container page-wrapper">
        <a href="javascript:history.back()" class="back-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
            Back
        </a>

        <div id="petProfile">
            <div class="profile-loading">
                <div class="spinner"></div>
                <p>Loading pet profile...</p>
            </div>
        </div>
    </div>

    <!-- Adoption Modal -->
    <div class="modal-overlay" id="adoptionModal">
        <div class="adopt-modal">
            <h3>Adopt <span id="modalPetName"></span></h3>
            <p>Tell us why you'd like to adopt this pet. This helps us match pets with the best homes.</p>
            <textarea id="adoptionMessage" placeholder="I would love to adopt this pet because..."></textarea>
            <div id="adoptMsgBox"></div>
            <div class="modal-actions">
                <button class="profile-btn modal-btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="profile-btn profile-btn-adopt" onclick="submitAdoption()" id="submitAdoptBtn">
                    Submit Request
                </button>
            </div>
        </div>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById('navMenu').classList.toggle('active');
            document.querySelector('.hamburger').classList.toggle('active');
        }
        window.addEventListener('scroll', () => {
            document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 20);
        });

        let petData = null;
        let isFavorited = false;

        // Get pet ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const petId = parseInt(urlParams.get('id'));

        async function loadPet() {
            if (!petId) {
                document.getElementById('petProfile').innerHTML = '<div class="empty-state"><p>Pet not found.</p><p><a href="browse.html">Browse available pets</a></p></div>';
                return;
            }

            try {
                const [petRes, favRes] = await Promise.all([
                    fetch(`/api/pets/${petId}`, { credentials: 'include' }),
                    fetch('/api/favorites', { credentials: 'include' })
                ]);

                if (!petRes.ok) {
                    if (petRes.status === 401) { window.location.href = '/login'; return; }
                    document.getElementById('petProfile').innerHTML = '<div class="empty-state"><p>Pet not found.</p><p><a href="browse.html">Browse available pets</a></p></div>';
                    return;
                }

                const petResult = await petRes.json();
                const favResult = await favRes.json();

                if (!petResult.ok) {
                    document.getElementById('petProfile').innerHTML = '<div class="empty-state"><p>Pet not found.</p><p><a href="browse.html">Browse available pets</a></p></div>';
                    return;
                }

                petData = petResult.pet;
                isFavorited = favResult.ok && favResult.pet_ids.includes(petId);

                document.title = `${petData.name} — Adoptly`;
                renderPetProfile();
            } catch (e) {
                console.error(e);
                document.getElementById('petProfile').innerHTML = '<div class="empty-state"><p>Error loading pet profile.</p></div>';
            }
        }

        function getPetEmoji(type) {
            const map = { Dog: '\uD83D\uDC36', Cat: '\uD83D\uDC31', Bird: '\uD83D\uDC26', Rabbit: '\uD83D\uDC30' };
            return map[type] || '\uD83D\uDC3E';
        }

        function renderPetProfile() {
            const pet = petData;
            const favBtnText = isFavorited ? 'Remove Favorite' : 'Add to Favorites';
            const favBtnClass = isFavorited ? 'is-fav' : '';
            const favIcon = isFavorited
                ? '<svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>'
                : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>';

            const hasImage = pet.image_url && pet.image_url.length > 0;
            const avatarHtml = hasImage
                ? `<img src="${pet.image_url}" alt="${pet.name}" class="profile-avatar" onerror="this.onerror=null;this.outerHTML='<div class=\\'profile-avatar-placeholder\\'>${getPetEmoji(pet.type)}</div>';">`
                : `<div class="profile-avatar-placeholder">${getPetEmoji(pet.type)}</div>`;

            document.getElementById('petProfile').innerHTML = `
                <div class="pet-profile">
                    <div class="profile-header">
                        <div class="profile-header-content">
                            <div class="profile-avatar-container">${avatarHtml}</div>
                            <div class="profile-name">
                                <h1>${pet.name}</h1>
                                <div class="profile-breed">${pet.breed} · ${pet.color}</div>
                            </div>
                            <span class="profile-type-badge">${pet.type}</span>
                        </div>
                    </div>
                    <div class="profile-body">
                        ${pet.description ? `<div class="profile-description">${pet.description}</div>` : ''}

                        <div class="tags-row">
                            ${pet.vaccinated ? '<span class="tag tag-green"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Vaccinated</span>' : '<span class="tag tag-amber">Not Vaccinated</span>'}
                            ${pet.kid_friendly ? '<span class="tag tag-green"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Kid Friendly</span>' : ''}
                            ${pet.has_previous_owner ? '<span class="tag tag-blue">Had Previous Owner</span>' : '<span class="tag tag-amber">No Previous Owner</span>'}
                            <span class="tag tag-green">${pet.health_condition} Health</span>
                        </div>

                        <div class="details-section">
                            <h3>
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
                                Basic Information
                            </h3>
                            <div class="details-grid">
                                <div class="detail-item">
                                    <div class="detail-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
                                    <div class="detail-text"><span class="detail-label">Age</span><span class="detail-value">${pet.age_months} months</span></div>
                                </div>
                                <div class="detail-item">
                                    <div class="detail-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/></svg></div>
                                    <div class="detail-text"><span class="detail-label">Weight</span><span class="detail-value">${pet.weight_kg} kg</span></div>
                                </div>
                                <div class="detail-item">
                                    <div class="detail-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div>
                                    <div class="detail-text"><span class="detail-label">Gender</span><span class="detail-value">${pet.gender}</span></div>
                                </div>
                                <div class="detail-item">
                                    <div class="detail-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v6m0 6v6m-7-7h6m6 0h6"/></svg></div>
                                    <div class="detail-text"><span class="detail-label">Color</span><span class="detail-value">${pet.color}</span></div>
                                </div>
                                <div class="detail-item">
                                    <div class="detail-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 22c-4.97 0-9-2.24-9-5v-6c0-2.76 4.03-5 9-5s9 2.24 9 5v6c0 2.76-4.03 5-9 5z"/></svg></div>
                                    <div class="detail-text"><span class="detail-label">Size</span><span class="detail-value">${pet.size}</span></div>
                                </div>
                                <div class="detail-item">
                                    <div class="detail-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="13 2 3 14h9l-1 8 10-12h-9l1-8z"/></svg></div>
                                    <div class="detail-text"><span class="detail-label">Energy</span><span class="detail-value">${pet.energy_level}</span></div>
                                </div>
                            </div>
                        </div>

                        <div class="details-section">
                            <h3>
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                                Care Details
                            </h3>
                            <div class="details-grid">
                                <div class="detail-item">
                                    <div class="detail-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/></svg></div>
                                    <div class="detail-text"><span class="detail-label">Food</span><span class="detail-value">${pet.food_preference || 'Standard'}</span></div>
                                </div>
                                <div class="detail-item">
                                    <div class="detail-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div>
                                    <div class="detail-text"><span class="detail-label">Shedding</span><span class="detail-value">Level ${pet.shedding_level}/4</span></div>
                                </div>
                                <div class="detail-item">
                                    <div class="detail-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 3h7v7H3zM14 3h7v7h-7zM14 14h7v7h-7zM3 14h7v7H3z"/></svg></div>
                                    <div class="detail-text"><span class="detail-label">Days in Shelter</span><span class="detail-value">${pet.days_in_shelter} days</span></div>
                                </div>
                                <div class="detail-item">
                                    <div class="detail-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3H14z"/></svg></div>
                                    <div class="detail-text"><span class="detail-label">Meat Diet</span><span class="detail-value">${pet.meat_consumption ? 'Yes' : 'No'}</span></div>
                                </div>
                            </div>
                        </div>

                        <div class="profile-actions">
                            <button class="profile-btn profile-btn-adopt" onclick="openAdoptionModal()">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                                Adopt
                            </button>
                            <button class="profile-btn profile-btn-fav ${favBtnClass}" id="favBtn" onclick="toggleFavorite()">
                                ${favIcon}
                                ${favBtnText}
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function openAdoptionModal() {
            document.getElementById('modalPetName').textContent = petData.name;
            document.getElementById('adoptionModal').classList.add('active');
            document.getElementById('adoptMsgBox').className = '';
            document.getElementById('adoptMsgBox').textContent = '';
        }

        function closeModal() {
            document.getElementById('adoptionModal').classList.remove('active');
        }

        async function submitAdoption() {
            const msg = document.getElementById('adoptionMessage').value.trim();
            const msgBox = document.getElementById('adoptMsgBox');
            const btn = document.getElementById('submitAdoptBtn');

            btn.disabled = true;
            btn.textContent = 'Submitting...';

            try {
                const r = await fetch('/api/adoptions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pet_id: petId, message: msg }),
                    credentials: 'include'
                });
                const data = await r.json();
                if (data.ok) {
                    msgBox.textContent = 'Adoption request submitted successfully!';
                    msgBox.className = 'adopt-msg-success';
                    setTimeout(() => closeModal(), 2000);
                } else {
                    msgBox.textContent = data.message || 'Failed to submit request.';
                    msgBox.className = 'adopt-msg-error';
                }
            } catch {
                msgBox.textContent = 'Error submitting request. Please try again.';
                msgBox.className = 'adopt-msg-error';
            }

            btn.disabled = false;
            btn.textContent = 'Submit Request';
        }

        async function toggleFavorite() {
            const method = isFavorited ? 'DELETE' : 'POST';
            try {
                const r = await fetch(`/api/favorites/${petId}`, { method, credentials: 'include' });
                const data = await r.json();
                if (data.ok) {
                    isFavorited = !isFavorited;
                    renderPetProfile();
                }
            } catch (e) { console.error(e); }
        }

        async function logout() {
            try { await fetch('/api/logout', { method: 'POST', credentials: 'include' }); }
            catch {}
            window.location.href = '/';
        }

        // Close modal on overlay click
        document.getElementById('adoptionModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        window.addEventListener('DOMContentLoaded', loadPet);
    </script>
</body>
</html>
